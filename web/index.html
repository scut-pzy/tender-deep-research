<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tender Deep Research</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: {
              primary: 'var(--bg-primary)',
              secondary: 'var(--bg-secondary)',
              card: 'rgba(255,255,255,0.03)',
              sidebar: 'var(--bg-sidebar)',
              input: 'var(--bg-input)',
              header: 'var(--bg-header)',
            },
            accent: {
              DEFAULT: '#3b82f6',
              hover: '#2563eb',
              glow: 'rgba(59,130,246,0.25)',
            },
            verify: { pass: '#22c55e', fail: '#ef4444' },
            amber: { DEFAULT: '#f59e0b', dim: 'rgba(245,158,11,0.15)' },
          },
          animation: {
            'slide-in': 'slideInUp 0.35s ease-out',
            'fade-in': 'fadeIn 0.3s ease-out',
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
          },
          keyframes: {
            slideInUp: {
              '0%': { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            pulseGlow: {
              '0%,100%': { boxShadow: '0 0 8px rgba(59,130,246,0.15)' },
              '50%': { boxShadow: '0 0 20px rgba(59,130,246,0.35)' },
            },
          },
        },
      },
    };
  </script>

  <!-- Lucide Icons (pinned version) -->
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.js"></script>

  <!-- marked.js for final summary tables -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/chat.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body class="bg-surface-primary dark:text-slate-200 text-slate-800 h-screen overflow-hidden font-sans text-sm leading-relaxed">

  <!-- Header -->
  <header class="fixed top-0 inset-x-0 z-50 h-13 flex items-center justify-between px-5
                 bg-surface-header/80 backdrop-blur-xl border-b dark:border-white/5 border-black/5">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent to-indigo-500 flex items-center justify-center">
        <i data-lucide="search" class="w-4 h-4 text-white"></i>
      </div>
      <h1 class="text-base font-semibold bg-gradient-to-r dark:from-white dark:to-slate-400 from-slate-800 to-slate-500 bg-clip-text text-transparent">
        Tender Deep Research
      </h1>
    </div>
    <div class="flex items-center gap-2">
      <button id="history-toggle" class="p-2 rounded-lg dark:hover:bg-white/5 hover:bg-black/5 text-slate-400 dark:hover:text-white hover:text-slate-700 transition" title="历史记录">
        <i data-lucide="history" class="w-5 h-5"></i>
      </button>
      <button id="theme-toggle" class="p-2 rounded-lg dark:hover:bg-white/5 hover:bg-black/5 text-slate-400 dark:hover:text-white hover:text-slate-700 transition" title="切换主题">
        <i data-lucide="sun" class="w-5 h-5"></i>
      </button>
      <button id="sidebar-toggle" class="p-2 rounded-lg dark:hover:bg-white/5 hover:bg-black/5 text-slate-400 dark:hover:text-white hover:text-slate-700 transition" title="切换侧栏">
        <i data-lucide="panel-left" class="w-5 h-5"></i>
      </button>
    </div>
  </header>

  <!-- Main layout -->
  <div class="flex h-[calc(100vh-52px)] mt-[52px]">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[380px] min-w-[380px] bg-surface-sidebar border-r dark:border-white/5 border-black/5
                               flex flex-col overflow-hidden transition-all duration-300 ease-in-out">
      <!-- Sidebar toolbar -->
      <div class="flex items-center justify-between px-4 py-3 border-b dark:border-white/5 border-black/5 flex-shrink-0">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">分析过程</span>
        <button id="btn-toggle-process" class="text-xs px-2.5 py-1 rounded-md dark:bg-white/5 bg-black/5 text-slate-400
                                                dark:hover:bg-white/10 hover:bg-black/10 dark:hover:text-white hover:text-slate-700 transition" title="显示/隐藏过程">
          <i data-lucide="eye" class="w-3.5 h-3.5 inline-block align-middle mr-1"></i>
          <span id="toggle-process-label">隐藏</span>
        </button>
      </div>
      <!-- Scrollable content -->
      <div id="sidebar-scroll" class="flex-1 overflow-y-auto px-3 py-3 space-y-3">
        <!-- prep-section: Steps 1-3 -->
        <div id="prep-section" class="hidden">
          <div class="text-xs font-semibold text-slate-500 mb-2 flex items-center gap-1.5">
            <i data-lucide="settings-2" class="w-3.5 h-3.5"></i> 预处理
          </div>
          <div id="prep-content" class="space-y-1 text-xs text-slate-400"></div>
        </div>
        <!-- round sections will be appended here dynamically -->
      </div>
    </aside>

    <!-- Chat area -->
    <main class="flex-1 flex flex-col min-w-0 relative">
      <div class="messages flex-1 overflow-y-auto px-6 py-6 flex flex-col gap-4" id="messages">
        <div class="welcome-message text-center py-20 px-6">
          <div class="inline-flex w-16 h-16 rounded-2xl bg-gradient-to-br from-accent/20 to-indigo-500/20
                      items-center justify-center mb-6 ring-1 ring-white/10">
            <i data-lucide="file-search" class="w-8 h-8 text-accent"></i>
          </div>
          <h2 class="text-2xl font-bold bg-gradient-to-r dark:from-white dark:via-slate-200 dark:to-slate-400
                     from-slate-800 via-slate-600 to-slate-400 bg-clip-text text-transparent mb-3">
            欢迎使用 Tender Deep Research
          </h2>
          <p class="text-slate-400 text-base max-w-md mx-auto">
            上传招标文件 PDF，选择要提取的字段，AI 将为您深度分析。
          </p>
        </div>
      </div>

      <!-- Input toolbar -->
      <div class="input-toolbar flex-shrink-0 border-t dark:border-white/5 border-black/5 bg-surface-secondary/80 backdrop-blur-xl px-6 py-4">
        <!-- Mode tabs -->
        <div class="mode-tabs mb-3" id="mode-tabs">
          <button class="mode-tab active" data-mode="extract">
            <i data-lucide="file-search" class="w-4 h-4"></i> 信息提取
          </button>
          <button class="mode-tab" data-mode="compliance">
            <i data-lucide="shield-check" class="w-4 h-4"></i> 合规核查
          </button>
        </div>
        <!-- Compliance checklist panel (visible only in compliance mode) -->
        <div id="checklist-panel" class="hidden"></div>
        <div class="input-attachments" id="input-attachments"></div>
        <div class="field-chips" id="field-chips"></div>
        <div class="flex items-center gap-2">
          <button id="btn-upload" class="p-2.5 rounded-lg dark:hover:bg-white/5 hover:bg-black/5 text-slate-400 hover:text-accent transition" title="上传 PDF">
            <i data-lucide="paperclip" class="w-5 h-5"></i>
          </button>
          <input type="file" id="file-input" accept=".pdf,.doc,.docx" hidden>
          <div class="file-selector relative">
            <button id="btn-existing" class="btn-secondary" title="选择已有文件">
              <i data-lucide="folder-open" class="w-4 h-4 inline-block align-middle mr-1"></i>已有文件
            </button>
            <div class="file-dropdown" id="file-dropdown"></div>
          </div>
          <div class="field-selector relative">
            <button id="btn-template" class="btn-secondary" title="字段模板">
              <i data-lucide="list-checks" class="w-4 h-4 inline-block align-middle mr-1"></i>字段模板
            </button>
            <div class="template-dropdown" id="template-dropdown">
              <!-- dynamically populated by upload.js -->
            </div>
          </div>
          <input type="text" id="user-input" class="flex-1 bg-surface-input border dark:border-white/10 border-black/10 rounded-xl
                 px-4 py-2.5 text-sm dark:text-slate-200 text-slate-800 dark:placeholder-slate-500 placeholder-slate-400 outline-none
                 focus:border-accent/50 focus:ring-1 focus:ring-accent/20 transition"
                 placeholder="输入额外字段（逗号分隔）或自由提问...">
          <button id="btn-send" class="p-2.5 rounded-xl bg-accent hover:bg-accent-hover text-white transition
                                       disabled:opacity-40 disabled:cursor-not-allowed shadow-lg shadow-accent/20
                                       hover:shadow-accent/40" title="发送">
            <i data-lucide="send" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- History panel -->
  <div id="history-panel" class="hidden fixed top-[52px] right-0 z-40 w-80 h-[calc(100vh-52px)]
       dark:bg-surface-sidebar/95 bg-white/95 backdrop-blur-xl dark:border-l dark:border-white/5 border-l border-black/5
       flex flex-col overflow-hidden shadow-lg">
    <div class="flex items-center justify-between px-4 py-3 dark:border-b dark:border-white/5 border-b border-black/5 flex-shrink-0">
      <span class="text-xs font-semibold dark:text-slate-500 text-slate-400 uppercase tracking-wider">历史记录</span>
      <button id="history-close" class="text-slate-400 hover:text-slate-200 transition">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>
    <div id="history-list" class="flex-1 overflow-y-auto px-3 py-3 space-y-2">
      <div class="text-center text-slate-500 text-xs py-8">加载中...</div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
  <script>
    // Initialize Lucide icons after DOM load
    document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
  </script>
</body>
</html>
