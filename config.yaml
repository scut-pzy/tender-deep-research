# ============================================
# 服务配置
# ============================================

server:
  host: "0.0.0.0"
  port: 8000

# ============================================
# 模型配置
# ============================================

policy_llm:
  api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "${DASHSCOPE_API_KEY}"
  model: "qwen-plus"
  temperature: 0.3
  max_tokens: 4096

critic_vlm:
  api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "${DASHSCOPE_API_KEY}"
  model: "qwen-vl-max"
  temperature: 0.1
  max_tokens: 2048

embedding:
  api_base: "https://api.deepseek.com/v1"
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-embedding"
  dimensions: 1024

# ============================================
# RAG 配置
# ============================================

rag:
  chunk_size: 512        # 每个文本块大小（字符）
  chunk_overlap: 64      # 块间重叠字符数
  top_k: 5               # 每个要素检索 top_k 个块

# ============================================
# 流程控制
# ============================================

pipeline:
  max_iterations: 3         # 最大迭代轮次
  confidence_threshold: 0.8 # 置信度阈值，达到后提前停止

# ============================================
# 文件存储
# ============================================

files:
  upload_dir: "./cache/uploads"
  pages_dir: "./cache/pages"
  vectors_dir: "./cache/vectors"
  max_size_mb: 100
