# ============================================
# 服务配置
# ============================================

server:
  host: "0.0.0.0"
  port: 7123

# ============================================
# 模型配置
# ============================================

policy_llm:
  api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "${DASHSCOPE_API_KEY}"
  model: "qwen-plus"
  temperature: 0.3
  max_tokens: 4096

critic_vlm:
  api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "${DASHSCOPE_API_KEY}"
  model: "qwen-vl-max"
  temperature: 0.1
  max_tokens: 2048

embedding:
  api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "${DASHSCOPE_API_KEY}"
  model: "text-embedding-v4"
  dimensions: 1024

# ============================================
# RAG 配置
# ============================================

rag:
  mode: "parent_child"      # "flat" = 扁平 RAG, "parent_child" = 父子分块检索
  chunk_size: 512            # flat 模式：每个文本块大小（字符）
  chunk_overlap: 64          # flat 模式：块间重叠字符数
  parent_chunk_size: 1024    # parent_child 模式：父块大小
  parent_chunk_overlap: 128  # parent_child 模式：父块重叠
  child_chunk_size: 256      # parent_child 模式：子块大小
  child_chunk_overlap: 64    # parent_child 模式：子块重叠
  top_k: 5                   # 每个要素检索 top_k 个块

# ============================================
# 流程控制
# ============================================

pipeline:
  max_iterations: 3         # 每个字段最大迭代轮数
  confidence_threshold: 0.8 # 置信度阈值，达到后提前停止
  field_top_k: 5            # 单字段 RAG top-K

# ============================================
# 文件存储
# ============================================

files:
  upload_dir: "./cache/uploads"
  pages_dir: "./cache/pages"
  vectors_dir: "./cache/vectors"
  history_dir: "./data/history"
  max_size_mb: 100
